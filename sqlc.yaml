version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/repository/query"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        rename:
          os: "OS"
          url_path: "URLPath"
          url_query: "URLQuery"
          utm_source: "UTMSource"
          utm_medium: "UTMMedium"
          utm_campaign: "UTMCampaign"
          utm_content: "UTMContent"
          utm_term: "UTMTerm"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            nullable: false
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
